<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BI-VM</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body { overflow: hidden; }
    body.autosize { overflow: auto; height: auto; }
    #loader {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, Segoe UI, Roboto, sans-serif; color: #6b6a63; background: #fafaf8;
    }
    iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: none; }
    body.autosize iframe { position: static; width: 100%; }
  </style>
</head>
<body>
  <div id="loader">Загрузка…</div>
  <iframe id="app" src="https://script.google.com/macros/s/AKfycby3o5H3hr6dJ5O9ZBtkeCTHMKJa5WHbG4fPFAxvlN3SP5ERU-S3iOiSQzipkAdTybaZfA/exec"
    onload="document.getElementById('loader').style.display='none'"></iframe>
  <script>
    // ─── АВТОРАЗМЕР IFRAME ───────────────────────────────────────
    // Приложение внутри iframe (см. Index.html в Apps Script) каждые 600мс шлёт свою
    // реальную высоту через window.top.postMessage({ fdHeight: ... }, '*'). Здесь мы
    // ловим это сообщение и растягиваем iframe под контент, чтобы скроллилась только
    // родительская страница (нативно, без двойного скролла и тормозов).
    var iframe = document.getElementById('app');
    window.addEventListener('message', function (e) {
      var h = e.data && e.data.fdHeight;
      if (typeof h === 'number' && h > 200 && h < 50000) {
        document.body.classList.add('autosize');
        iframe.style.height = h + 'px';
      }
    });
  </script>
</body>
</html>
